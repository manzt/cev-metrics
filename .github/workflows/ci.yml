name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # Skip on release commits — release.yml builds those.
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'Release v')
    uses: ./.github/workflows/build.yml
